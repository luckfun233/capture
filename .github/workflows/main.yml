name: Build Windows EXE (Single File)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python pillow pyinstaller pygrabber comtypes

      - name: Build single EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --clean --noconfirm `
            --hidden-import cv2 `
            --hidden-import PIL._imaging `
            --collect-submodules cv2 `
            --collect-submodules comtypes `
            --collect-submodules pygrabber `
            --name capture `
            capture.pyw

      - name: Upload artifact (single EXE)
        uses: actions/upload-artifact@v4
        with:
          name: capture-windows
          path: dist/capture.exe
          retention-days: 7
