name: Build Camera App EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.10'
  APP_NAME: CameraCapture

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 📦 Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip

          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          }

          python -m pip install pyinstaller==6.11.1

      - name: ✅ Check source file
        shell: pwsh
        run: |
          if (-not (Test-Path "capture.pyw")) {
            throw "capture.pyw not found in repository root."
          }

      - name: 📦 Build EXE with PyInstaller
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $pyiArgs = @(
            "--onefile",
            "--windowed",
            "--name", $env:APP_NAME,
            "--clean",
            "--noconfirm",
            "capture.pyw"
          )

          python -m PyInstaller @pyiArgs

      - name: 📊 Show build info
        shell: pwsh
        run: |
          Get-ChildItem -Recurse dist
          Get-Item "dist/$env:APP_NAME.exe" | Select-Object FullName, Length, LastWriteTime

      - name: 📤 Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: camera-app-exe
          path: dist/${{ env.APP_NAME }}.exe
          if-no-files-found: error
