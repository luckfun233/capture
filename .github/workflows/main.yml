name: Build Windows EXE (Single File)

on:
  workflow_dispatch:          # 允许手动触发
  push:
    branches: [ "main" ]      # 推送到 main 分支时自动构建

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python pillow pyinstaller

      - name: Build single EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconsole `
            --hidden-import opencv-python `
            --hidden-import PIL._imaging `
            --name capture `
            capture.pyw

      - name: Upload artifact (single EXE)
        uses: actions/upload-artifact@v4
        with:
          name: capture-windows
          path: dist/capture.exe
          retention-days: 7
